<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-container">
    <div class="blue-board">
        <select id="location" class="glass-panel location-select">
            <option value="" disabled selected>location</option>
            </select>

        <div class="middle-row">
            <div class="glass-panel toggle-container">
                <span class="toggle-label">bhk</span>
                <div class="radio-group" id="bhk-group">
                    <input type="radio" name="bhk" id="bhk1" value="1"><label for="bhk1">1</label>
                    <input type="radio" name="bhk" id="bhk2" value="2"><label for="bhk2">2</label>
                    <input type="radio" name="bhk" id="bhk3" value="3"><label for="bhk3">3</label>
                    <input type="radio" name="bhk" id="bhk4" value="4"><label for="bhk4">4</label>
                    <input type="radio" name="bhk" id="bhk5" value="5"><label for="bhk5">5</label>
                    <input type="radio" name="bhk" id="bhk6" value="6"><label for="bhk6">6</label>
                    <input type="radio" name="bhk" id="bhk7" value="7"><label for="bhk7">7</label>
                </div>
            </div>

            <div class="glass-panel toggle-container">
                <span class="toggle-label">no of bathroom</span>
                <div class="radio-group" id="bath-group">
                    <input type="radio" name="bath" id="bath1" value="1"><label for="bath1">1</label>
                    <input type="radio" name="bath" id="bath2" value="2"><label for="bath2">2</label>
                    <input type="radio" name="bath" id="bath3" value="3"><label for="bath3">3</label>
                    <input type="radio" name="bath" id="bath4" value="4"><label for="bath4">4</label>
                    <input type="radio" name="bath" id="bath5" value="5"><label for="bath5">5</label>
                    <input type="radio" name="bath" id="bath6" value="6"><label for="bath6">6</label>
                    <input type="radio" name="bath" id="bath7" value="7"><label for="bath7">7</label>
                </div>
            </div>
        </div>

        <div class="bottom-row">
            <input type="number" id="sqft" class="glass-panel sqft-input" placeholder="total square feet">
            <button id="predict-btn" class="glass-panel oval-btn">Predict</button>
        </div>
    </div>

    <div class="green-board">
        <div id="predicted-price" class="glass-panel result-display">Predicted Price</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
